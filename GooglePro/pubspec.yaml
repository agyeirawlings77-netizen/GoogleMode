  get_it: ^7.7.0
  injectable: ^2.4.2
  go_router: ^13.2.1
  flutter_webrtc: ^0.10.6
  web_socket_channel: ^2.4.5
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
